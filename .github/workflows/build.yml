name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m py_compile src/mark_down.py bin/mark_down.py
      - run: python -m unittest discover -s tests

  package:
    name: package-${{ matrix.os }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - name: Build macOS
        if: runner.os == 'macOS'
        run: scripts/build_macos.sh
      - name: Build Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\build_windows.ps1
      - name: Prepare artifact
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Windows" ]]; then
            7z a mark-down-windows.zip ./dist/mark-down/*
          else
            ditto -c -k --sequesterRsrc --keepParent ./dist/mark-down mark-down-macos.zip
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: mark-down-${{ runner.os }}
          path: mark-down-*.zip
      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: mark-down-*.zip
