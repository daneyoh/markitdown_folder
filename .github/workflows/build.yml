name: build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: source-mode-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m py_compile 개발/src/mark_down.py 실행/mark_down.py
      - run: bash -n 실행/macOS/setup.sh
      - run: bash -n 실행/macOS/run.sh
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r 개발/requirements.txt
      - run: python -c "from markitdown import MarkItDown; MarkItDown(); print('markitdown import ok')"
      - run: python -m unittest discover -s 개발/tests
      - run: python 실행/mark_down.py --list-supported
